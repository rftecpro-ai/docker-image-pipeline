name: CI

on:
  push:
    branches: ["feature/*", "main"]
  pull_request:
    branches: ["feature/*", "main"]

env:
  IMAGE_NAME: ffribeiro/docker-image-pipeline

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

  image_scan:
    needs: test
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # TEMP: also allow this branch to run for testing; revert before merging to main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/explore/reusable-image-scan-workflow')
    permissions:
      contents: read
      security-events: write # required to upload SARIF to the Security tab
    # Learn more about configuring this job here:
    # https://github.com/rftecpro-ai/reusable-workflows/blob/main/docs/image_scan.readme.md
    uses: rftecpro-ai/reusable-workflows/.github/workflows/image_scan.yml@v1
    with:
      dockerfile_context: .
      image_ref: scan-target
      version: ${{ needs.test.outputs.version }}
      trivy_version: "0.70.0"
      severity: "HIGH,CRITICAL"

  build-and-push:
    needs: [test, image_scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.test.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
