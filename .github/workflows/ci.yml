name: CI

on:
  push:
    branches: ["feature/*", "main"]
  pull_request:
    branches: ["feature/*", "main"]

env:
  IMAGE_NAME: ffribeiro/docker-image-pipeline
  TRIVY_VERSION: "0.70.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  build-and-push:
    needs: test
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # TEMP: also allow this feature branch to run for testing; revert before merging to main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/add-image-scan')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to the Security tab
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version
        id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      # --- Build a local, single-arch image purely to scan before anything is pushed.
      # Buildx can't --load a multi-platform manifest into the local daemon, so we scan
      # the amd64 variant here and reuse the GHA cache for the real multi-arch build below.
      - name: Build image for scanning (amd64, local only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: scan-target:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
      # Cache Trivy's vulnerability DB across the multiple scans below and across runs,
      # otherwise each `docker run` re-downloads the full DB (slow, and hits rate limits).
      - name: Restore Trivy DB cache
        uses: actions/cache@v4
        with:
          path: .trivy-cache
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
 
      - name: Trivy scan (SARIF, for Security tab / PR annotations)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}":/work \
            -v "${{ github.workspace }}/.trivy-cache":/root/.cache/trivy \
            aquasec/trivy:${{ env.TRIVY_VERSION }} image \
            --format sarif --output /work/trivy-results.sarif \
            --severity HIGH,CRITICAL \
            scan-target:${{ steps.version.outputs.value }}
 
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
 
      - name: Trivy scan (table, for job summary)
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivy-cache":/root/.cache/trivy \
            aquasec/trivy:${{ env.TRIVY_VERSION }} image \
            --format table --severity HIGH,CRITICAL --ignore-unfixed \
            scan-target:${{ steps.version.outputs.value }} \
            >> "$GITHUB_STEP_SUMMARY"

      # Trivy has no native "html" format; it renders one via the html.tpl template
      # from its own repo. Pin the template to TRIVY_VERSION so it always matches
      # the scanner binary's output schema.
      - name: Download Trivy HTML report template
        if: always()
        run: |
          mkdir -p contrib
          curl -sSL -o contrib/html.tpl \
            "https://raw.githubusercontent.com/aquasecurity/trivy/v${{ env.TRIVY_VERSION }}/contrib/html.tpl"

      - name: Trivy scan (HTML report, for artifact)
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}":/work \
            -v "${{ github.workspace }}/contrib":/contrib \
            -v "${{ github.workspace }}/.trivy-cache":/root/.cache/trivy \
            aquasec/trivy:${{ env.TRIVY_VERSION }} image \
            --format template --template "@/contrib/html.tpl" \
            --output /work/trivy-full-report.html --ignore-unfixed \
            scan-target:${{ steps.version.outputs.value }}

      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ steps.version.outputs.value }}
          path: |
            trivy-results.sarif
            trivy-full-report.html
          retention-days: 30

      # Fail the pipeline before anything reaches Docker Hub if HIGH/CRITICAL CVEs
      # exist AND a fix is available. Unfixed CVEs still show up in the Security
      # tab (SARIF scan above, which is intentionally not filtered) for tracking.
      - name: Gate on vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivy-cache":/root/.cache/trivy \
            aquasec/trivy:${{ env.TRIVY_VERSION }} image \
            --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed \
            scan-target:${{ steps.version.outputs.value }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
